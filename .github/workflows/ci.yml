name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Job graph
#
#   lint ──────────────────────────────────────────────────────────────────┐
#   typecheck ──────────────────────────────────────────────────────────── ├──► test   (15 min cap)
#   format-check (Prettier) ────────────────────────────────────────────── ┤──► build  (10 min cap)
#                                                                           └──► e2e    (20 min cap, non-blocking)
#   audit (npm audit --audit-level=high, non-blocking)
#
# All three workload jobs (test, build, e2e) start in parallel once the three
# quality gates pass.  E2E uses the Vite dev server so it does not wait for
# build.  E2E is continue-on-error so flakiness never blocks a merge.
# audit is informational and never blocks the pipeline.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Quality gate 1 — ESLint ───────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Quality gate 2 — TypeScript ───────────────────────────────────────────
  typecheck:
    name: Type Check (tsc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npm run typecheck

  # ── Quality gate 3 — Prettier ─────────────────────────────────────────────
  format-check:
    name: Format Check (Prettier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier format check
        run: npm run format:check

  # ── Security — npm audit ──────────────────────────────────────────────────
  # Informational: fails on HIGH+ vulnerabilities but does not block the
  # pipeline (continue-on-error).  Review the output in the Actions log;
  # promote to a blocking gate once the advisory backlog is cleared.
  audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Test suite — Jest + code coverage ────────────────────────────────────
  test:
    name: Test (Jest + Coverage)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, format-check]
    timeout-minutes: 15
    env:
      NODE_ENV: test
      # mongodb-memory-server downloads its binary to this cache dir
      MONGOMS_DOWNLOAD_DIR: /tmp/mongodb-binaries
      # Required by env.ts — safe values for the in-memory test environment
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      MONGODB_URI: mongodb://localhost:27017/linkora_test
      MONGODB_DB_NAME: linkora_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: test_redis_pass
      REDIS_DB: 1
      JWT_ACCESS_SECRET: test_jwt_access_secret_min_32_chars_ok
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_min_32_chars_ok
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      SESSION_SECRET: test_session_secret_min_32_chars_ok_x
      CLOUDINARY_CLOUD_NAME: test_cloud
      CLOUDINARY_API_KEY: test_api_key
      CLOUDINARY_API_SECRET: test_api_secret
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_USER: test@example.com
      SMTP_PASS: test_pass
      SMTP_FROM_NAME: Linkora Test
      SMTP_FROM_EMAIL: noreply@example.com
      LOG_LEVEL: error
      LOG_FILE_ENABLED: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v4
        with:
          path: /tmp/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            mongodb-binaries-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

  # ── Build — server (tsc) + client (Vite) ─────────────────────────────────
  build:
    name: Build (Server + Client)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, format-check]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ── E2E — Playwright (Chromium only in CI) ────────────────────────────────
  # Runs in parallel with test + build (only needs quality gates to pass).
  # Uses the Vite dev server, so the production build is not required here.
  # continue-on-error: E2E flakiness must never block a merge; failures are
  # visible in the Actions log and the uploaded report.
  e2e:
    name: E2E (Playwright / Chromium)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, format-check]
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # Download the browser binary only on a cache miss.
      # System dependencies are always installed separately below — they are
      # not cached and must be present even when the browser binary is cached.
      - name: Install Playwright browser (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      # Always run — installs OS-level libs Chromium needs.
      # ubuntu-latest already has most packages, so this is fast (~5 s).
      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Run E2E tests (Chromium)
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Playwright test output (failures)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-output-${{ github.sha }}
          path: playwright-output/
          retention-days: 7
          if-no-files-found: ignore
